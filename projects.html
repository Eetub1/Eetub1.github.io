<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects</title>
</head>
<body>
    <div id="app">
        <canvas id="canvas"></canvas>

        <div id="content">

            <main>
                <div id="personalProjects">
                    <h1>Personal projects</h1>

                    <div id="personalProjectsContainer">

                        <figure class="project">
                            <div class="imageContainer">
                                <a href="https://battleship-react-flame.vercel.app/"><img src="src/battleship.png" alt="Battleship game"></a>
                            </div>
                            <figcaption>A React Battleship game with a working AI</figcaption>
                        </figure>

                        <figure class="project">
                            <div class="imageContainer">
                                <a href="https://terminal-emulator-v2.vercel.app/"><img src="src/terminal.png" alt="Terminal emulator"></a>
                            </div>
                            <figcaption>Unix style terminal emulator written in Typescript</figcaption>
                        </figure>

                    </div>
                </div>
                

                <div id="schoolProjects">
                    <h1>School projects</h1>

                    <div id="schoolProjectsContainer">

                        <figure class="project">
                            <div class="imageContainer">
                                <a href="https://users.jyu.fi/~eeeeoino/web-uusin/vt6/pohja.html"><img src="src/karttasovellus.png" alt="icerogaining"></a>
                            </div>
                            <figcaption>React app where you can control checkpoints in icerogaining</figcaption>
                        </figure>

                        <figure class="project">
                            <div class="imageContainer">
                                <a href="https://gitlab.jyu.fi/eeeeoino/ohj2"><img src="src/bookRegister.png" alt="book register"></a>
                            </div>
                            <figcaption>A book collection management program written in Java</figcaption>
                        </figure>

                    </div>
                </div>

            </main>

        </div>

    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
